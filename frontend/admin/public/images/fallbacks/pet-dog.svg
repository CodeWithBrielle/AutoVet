<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Dog">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#fdf0e0"/>
  <!-- Floppy ears -->
  <ellipse cx="31" cy="42" rx="11" ry="16" fill="#c8925a" transform="rotate(-12 31 42)"/>
  <ellipse cx="69" cy="42" rx="11" ry="16" fill="#c8925a" transform="rotate(12 69 42)"/>
  <!-- Head -->
  <circle cx="50" cy="44" r="23" fill="#dba870"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="55" rx="13" ry="9" fill="#c8925a"/>
  <!-- Eyes -->
  <circle cx="42" cy="40" r="4" fill="#3d2b1a"/>
  <circle cx="58" cy="40" r="4" fill="#3d2b1a"/>
  <circle cx="43.2" cy="38.8" r="1.3" fill="white"/>
  <circle cx="59.2" cy="38.8" r="1.3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="51" rx="4.5" ry="3.5" fill="#3d2b1a"/>
  <!-- Mouth -->
  <path d="M46 54.5 Q50 57.5 54 54.5" stroke="#3d2b1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
