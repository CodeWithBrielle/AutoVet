<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Rabbit">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#fce8f0"/>
  <!-- Long ears -->
  <ellipse cx="37" cy="26" rx="9" ry="22" fill="#f0b8d0"/>
  <ellipse cx="63" cy="26" rx="9" ry="22" fill="#f0b8d0"/>
  <!-- Inner ears (pink) -->
  <ellipse cx="37" cy="26" rx="5" ry="17" fill="#e87aaa"/>
  <ellipse cx="63" cy="26" rx="5" ry="17" fill="#e87aaa"/>
  <!-- Head -->
  <circle cx="50" cy="55" r="22" fill="#f5d0e0"/>
  <!-- Eyes -->
  <circle cx="42" cy="51" r="4" fill="#c04080"/>
  <circle cx="58" cy="51" r="4" fill="#c04080"/>
  <circle cx="43" cy="50" r="1.3" fill="white"/>
  <circle cx="59" cy="50" r="1.3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="58" rx="3" ry="2.5" fill="#d06090"/>
  <!-- Mouth -->
  <path d="M47 59.5 Q50 62 53 59.5" stroke="#d06090" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="39" cy="58" rx="5" ry="3" fill="#f0a0c0" opacity="0.5"/>
  <ellipse cx="61" cy="58" rx="5" ry="3" fill="#f0a0c0" opacity="0.5"/>
</svg>
